<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="loginForm">
      <h1 id="brand">Meridian</h1>
      <p class="tag" id="tag">Loading…</p>
      <label for="email" data-i18n="workEmail">Work email</label>
      <input id="email" type="email" autocomplete="username" value="" />
      <label for="password" data-i18n="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" value="" />
      <button class="full" type="submit" data-i18n="signIn">Sign in</button>
      <div class="err" id="err"></div>
      <div class="hintbox" id="creds"></div>
      <button type="button" class="lang-link" id="langBtn">🌐 PT</button>
    </form>
  </div>
  <script>
    const L = {
      en: { workEmail: 'Work email', password: 'Password', signIn: 'Sign in', demo: 'Demo login', invalid: 'Invalid credentials.' },
      pt: { workEmail: 'E-mail de trabalho', password: 'Senha', signIn: 'Entrar', demo: 'Login de demonstração', invalid: 'Credenciais inválidas.' },
    };
    let lang = (localStorage.getItem('meridian_lang') === 'pt') ? 'pt' : 'en';
    let META = null;
    const tr = (k) => (L[lang] && L[lang][k]) || L.en[k];
    function applyLang() {
      document.querySelectorAll('[data-i18n]').forEach((e) => { e.textContent = tr(e.dataset.i18n); });
      document.getElementById('langBtn').textContent = '🌐 ' + lang.toUpperCase();
      if (META) {
        document.getElementById('tag').textContent = (lang === 'pt' && META.taglinePt) ? META.taglinePt : META.tagline;
        if (META.demo) document.getElementById('creds').innerHTML = tr('demo') + ' &mdash; <b>' + META.demo.email + '</b> / <b>' + META.demo.password + '</b>';
      }
    }
    fetch('/api/meta').then((r) => r.json()).then((m) => {
      META = m;
      document.body.dataset.domain = m.domain;
      document.getElementById('brand').textContent = m.brand;
      document.title = 'Sign in · ' + m.brand;
      if (m.demo) { document.getElementById('email').value = m.demo.email; document.getElementById('password').value = m.demo.password; }
      applyLang();
    });
    document.getElementById('langBtn').onclick = () => { lang = (lang === 'en') ? 'pt' : 'en'; localStorage.setItem('meridian_lang', lang); applyLang(); };
    const f = document.getElementById('loginForm');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('err').textContent = '';
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      if (res.ok) { location.href = '/'; }
      else { document.getElementById('err').textContent = tr('invalid'); }
    });
  </script>
</body>
</html>
